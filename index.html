<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Administración de Productos</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <h1>Panel de Administración</h1>
  <button id="btn-agregar">Agregar producto</button>
  <div id="categorias-container"></div>

  

  <!-- Formulario para agregar producto -->
  <form id="form-producto" style="display:none;">
    <input type="text" style="margin: 8px;" id="cat" placeholder="Categoría" required>
    <input type="text" style="margin: 8px;" id="nombre" placeholder="Nombre del producto" required>
    <input type="number" style="margin: 8px;" id="zelle" placeholder="Precio en Zelle" required>
    <textarea id="nota" style="margin: 8px;" placeholder="Nota opcional sobre el producto"></textarea>
    <p>Agrega la imagen del producto</p>
    <input type="file" style="margin: 8px;" id="img" accept="image/*">
    <label>
      <input type="checkbox" style="margin: 8px;" id="activo" checked> Disponible en ofertas
    </label>
    <button type="submit">Aceptar</button>
  </form>

  <hr>

  <!-- Lista de productos existentes -->
  <h2>Productos actuales</h2>
  <div id="lista-productos"></div>

  
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin.js"></script>
</body>
</html>
